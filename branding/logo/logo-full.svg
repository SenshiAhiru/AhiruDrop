<?xml version="1.0" encoding="UTF-8"?>
<!--
  AhiruDrop · logo-full · v0
  Mascote (à esquerda) + wordmark "AhiruDrop" (à direita).
  Layout horizontal pensado pra header de site, banner LinkedIn,
  apresentação. 800×256.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 256" width="800" height="256">
  <defs>
    <linearGradient id="bodyGradF" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="55%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="bodyShineF" cx="35%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="purpleSparkleF" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- ═══ Mascot ═══ -->
  <g transform="translate(0, 0)">
    <path
      d="M 128 28
         C 178 28, 218 64, 218 118
         C 218 168, 178 218, 128 218
         C 78 218, 38 178, 38 130
         C 38 88, 70 52, 110 38
         C 116 35, 122 32, 128 28 Z"
      fill="url(#bodyGradF)"/>
    <path
      d="M 128 28
         C 178 28, 218 64, 218 118
         C 218 168, 178 218, 128 218
         C 78 218, 38 178, 38 130
         C 38 88, 70 52, 110 38
         C 116 35, 122 32, 128 28 Z"
      fill="url(#bodyShineF)"/>
    <path
      d="M 200 110 Q 240 118, 240 130 Q 240 142, 200 150 L 195 130 Z"
      fill="#f59e0b"/>
    <path d="M 200 110 Q 240 118, 240 130 L 200 130 Z" fill="#fbbf24" opacity="0.4"/>
    <circle cx="170" cy="100" r="11" fill="#0a0a0a"/>
    <circle cx="173" cy="96" r="3" fill="#ffffff"/>
    <path
      d="M 215 50 L 220 64 L 234 69 L 220 74 L 215 88 L 210 74 L 196 69 L 210 64 Z"
      fill="url(#purpleSparkleF)"/>
    <circle cx="60" cy="72" r="3.5" fill="#fbbf24" opacity="0.85"/>
  </g>

  <!-- ═══ Wordmark ═══ -->
  <g transform="translate(280, 0)">
    <text
      x="0" y="160"
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
      font-weight="900"
      font-size="110"
      letter-spacing="-3"
      fill="url(#wordmark)"
    >AhiruDrop</text>
    <text
      x="3" y="200"
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
      font-weight="600"
      font-size="20"
      letter-spacing="3"
      fill="#a1a1aa"
    >RIFAS DE SKINS · PROVABLY FAIR</text>
  </g>
</svg>
