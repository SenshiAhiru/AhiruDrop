<?xml version="1.0" encoding="UTF-8"?>
<!--
  AhiruDrop · Twitter/X banner · v0
  1500×500. Lembre que o Twitter corta as bordas em telas
  pequenas — todo o conteúdo importante está na faixa central
  (margem de ~150px nas laterais).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0b2e"/>
      <stop offset="50%" stop-color="#2e1065"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bodyGradB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="55%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="bodyShineB" cx="35%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wordmarkB" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="60%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>

  <!-- Background layers -->
  <rect width="1500" height="500" fill="url(#bg)"/>
  <rect width="1500" height="500" fill="url(#glow1)"/>
  <rect width="1500" height="500" fill="url(#glow2)"/>

  <!-- Decorative grid (subtle) -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="100" x2="1500" y2="100"/>
    <line x1="0" y1="200" x2="1500" y2="200"/>
    <line x1="0" y1="300" x2="1500" y2="300"/>
    <line x1="0" y1="400" x2="1500" y2="400"/>
  </g>

  <!-- Tiny stars -->
  <g fill="#ffffff" opacity="0.4">
    <circle cx="200" cy="80" r="1.5"/>
    <circle cx="350" cy="420" r="2"/>
    <circle cx="900" cy="60" r="1.5"/>
    <circle cx="1100" cy="440" r="2"/>
    <circle cx="1300" cy="120" r="1.5"/>
  </g>

  <!-- Mascot left of center, scaled to ~280px square -->
  <g transform="translate(450, 110) scale(1.1)">
    <path
      d="M 128 28
         C 178 28, 218 64, 218 118
         C 218 168, 178 218, 128 218
         C 78 218, 38 178, 38 130
         C 38 88, 70 52, 110 38
         C 116 35, 122 32, 128 28 Z"
      fill="url(#bodyGradB)"/>
    <path
      d="M 128 28
         C 178 28, 218 64, 218 118
         C 218 168, 178 218, 128 218
         C 78 218, 38 178, 38 130
         C 38 88, 70 52, 110 38
         C 116 35, 122 32, 128 28 Z"
      fill="url(#bodyShineB)"/>
    <path d="M 200 110 Q 240 118, 240 130 Q 240 142, 200 150 L 195 130 Z" fill="#f59e0b"/>
    <path d="M 200 110 Q 240 118, 240 130 L 200 130 Z" fill="#fbbf24" opacity="0.4"/>
    <circle cx="170" cy="100" r="11" fill="#0a0a0a"/>
    <circle cx="173" cy="96" r="3" fill="#ffffff"/>
    <path
      d="M 215 50 L 220 64 L 234 69 L 220 74 L 215 88 L 210 74 L 196 69 L 210 64 Z"
      fill="#a78bfa"/>
  </g>

  <!-- Wordmark + tagline -->
  <text
    x="760" y="240"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-weight="900"
    font-size="120"
    letter-spacing="-3.5"
    fill="url(#wordmarkB)"
  >AhiruDrop</text>
  <text
    x="763" y="290"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-weight="600"
    font-size="22"
    letter-spacing="4"
    fill="#fbbf24"
  >RIFAS DE SKINS CS2 · PROVABLY FAIR</text>
  <text
    x="763" y="335"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-weight="400"
    font-size="20"
    fill="#a1a1aa"
  >Sorteios verificáveis publicamente via Bitcoin · 1 AHC = $1 USD</text>
  <text
    x="763" y="385"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-weight="700"
    font-size="22"
    fill="#a78bfa"
  >ahirudrop.vercel.app</text>
</svg>
