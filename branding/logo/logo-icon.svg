<?xml version="1.0" encoding="UTF-8"?>
<!--
  AhiruDrop · logo-icon · v0
  Mascote do pato em silhueta kawaii minimalista. 256×256 viewBox,
  escala perfeitamente. Use como app icon, favicon source, social
  avatar (centralize sobre fundo da paleta).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="55%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="bodyShine" cx="35%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="purpleSparkle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Body / head merged: a wide rounded teardrop shape suggesting
       both a duck silhouette and the AhiruDROP concept. -->
  <path
    d="M 128 28
       C 178 28, 218 64, 218 118
       C 218 168, 178 218, 128 218
       C 78 218, 38 178, 38 130
       C 38 88, 70 52, 110 38
       C 116 35, 122 32, 128 28 Z"
    fill="url(#bodyGrad)"
    stroke="#0a0a0a"
    stroke-width="0"/>

  <!-- Soft top highlight giving volume -->
  <path
    d="M 128 28
       C 178 28, 218 64, 218 118
       C 218 168, 178 218, 128 218
       C 78 218, 38 178, 38 130
       C 38 88, 70 52, 110 38
       C 116 35, 122 32, 128 28 Z"
    fill="url(#bodyShine)"/>

  <!-- Bill: rounded soft triangle pointing right -->
  <path
    d="M 200 110
       Q 240 118, 240 130
       Q 240 142, 200 150
       L 195 130 Z"
    fill="#f59e0b"/>
  <path
    d="M 200 110
       Q 240 118, 240 130
       L 200 130 Z"
    fill="#fbbf24" opacity="0.4"/>

  <!-- Eye -->
  <circle cx="170" cy="100" r="11" fill="#0a0a0a"/>
  <circle cx="173" cy="96" r="3" fill="#ffffff"/>

  <!-- Drop / sparkle star top-right — references the "Drop" name -->
  <path
    d="M 215 50
       L 220 64
       L 234 69
       L 220 74
       L 215 88
       L 210 74
       L 196 69
       L 210 64 Z"
    fill="url(#purpleSparkle)"/>

  <!-- Tiny secondary sparkle for extra delight -->
  <circle cx="60" cy="72" r="3.5" fill="#fbbf24" opacity="0.85"/>
  <circle cx="48" cy="180" r="2.5" fill="#fbbf24" opacity="0.7"/>
</svg>
